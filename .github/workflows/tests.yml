name: tests

on:
  push:
    branches: [main]
    paths:
      - 'patchCleanerRevisited.ps1'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pester:
    name: Pester (${{ matrix.os }}, PowerShell ${{ matrix.psversion }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        psversion: ['5.1', '7']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell ${{ matrix.psversion }}
        if: matrix.psversion == '7'
        uses: actions/setup-powershell@v5
        with:
          powershell-version: '7.x'

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config