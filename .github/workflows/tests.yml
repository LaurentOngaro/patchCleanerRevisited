name: tests

on:
  push:
    branches: [main]
    paths:
      - 'patchCleanerRevisited.ps1'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pester:
    name: Pester (${{ matrix.os }}, ${{ matrix.pshost.shell }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        # 'pshost' is the human label only. The actual shell selection happens
        # via duplicated steps with `if:` guards, because GitHub Actions does
        # not allow ${{ matrix.* }} expressions inside `shell:` keys (the
        # shell name must be a literal). We previously tried
        # `shell: ${{ matrix.shell }}` and GitHub returned
        # "Unrecognized named-value: 'matrix'".
        pshost:
          - name: 'Windows PowerShell 5.1'
            shell: 'powershell'
          - name: 'PowerShell 7+'
            shell: 'pwsh'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Windows PowerShell 5.1 (literal `shell: powershell`)
      # ---------------------------------------------------------------------
      - name: Install Pester 5 (Windows PowerShell 5.1)
        if: matrix.pshost.shell == 'powershell'
        shell: powershell
        run: |
          # We use `Save-Module` (not `Install-Module`) to download Pester 5.7.1
          # into a known folder inside the workspace, then import it explicitly
          # by path. This sidesteps three runner quirks:
          #   - Windows PowerShell 5.1 looks for modules under
          #     $env:USERPROFILE\Documents\WindowsPowerShell\Modules, not the
          #     PowerShell 7+ location.
          #   - Install-Module on 5.1 does not accept -AcceptLicense and fails
          #     with "parameter not found".
          #   - Pester 6 has breaking scope changes in BeforeAll that break our
          #     dot-source pattern, so we pin to 5.7.1.
          $pesterDir = Join-Path $env:RUNNER_TEMP 'Pester'
          if (-not (Test-Path (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1'))) {
            Save-Module -Name Pester -RequiredVersion '5.7.1' -Path $pesterDir -Force
          }
          Import-Module (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1') -Force
          $loaded = Get-Module -Name Pester | Select-Object -First 1
          Write-Host "Pester in use: $($loaded.Version) on host $($PSVersionTable.PSVersion)"

      - name: Run Pester (Windows PowerShell 5.1)
        if: matrix.pshost.shell == 'powershell'
        shell: powershell
        run: |
          $pesterDir = Join-Path $env:RUNNER_TEMP 'Pester'
          Import-Module (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1') -Force
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
        env:
          # Required by the tests to dot-source the script without launching the GUI.
          PCREV_TEST_HARNESS: '1'

      # ---------------------------------------------------------------------
      # PowerShell 7+ (literal `shell: pwsh`)
      # ---------------------------------------------------------------------
      - name: Install Pester 5 (PowerShell 7+)
        if: matrix.pshost.shell == 'pwsh'
        shell: pwsh
        run: |
          # Same approach as the 5.1 branch: Save-Module into a temp folder,
          # then import by path. This avoids cross-version PSModulePath
          # conflicts on the runner and pins to Pester 5.7.1.
          $pesterDir = Join-Path $env:RUNNER_TEMP 'Pester'
          if (-not (Test-Path (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1'))) {
            Save-Module -Name Pester -RequiredVersion '5.7.1' -Path $pesterDir -Force
          }
          Import-Module (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1') -Force
          $loaded = Get-Module -Name Pester | Select-Object -First 1
          Write-Host "Pester in use: $($loaded.Version) on host $($PSVersionTable.PSVersion)"

      - name: Run Pester (PowerShell 7+)
        if: matrix.pshost.shell == 'pwsh'
        shell: pwsh
        run: |
          $pesterDir = Join-Path $env:RUNNER_TEMP 'Pester'
          Import-Module (Join-Path $pesterDir 'Pester/5.7.1/Pester.psd1') -Force
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
        env:
          # Required by the tests to dot-source the script without launching the GUI.
          PCREV_TEST_HARNESS: '1'